name: Bundle tarball
on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: ldacBT
          submodules: recursive
          fetch-depth: 0

      - name: Bundle
        id: bundle
        run: |
          cd ldacBT/
          version=$(git describe --abbrev=7 --tags | sed 's/^v//;s/\([^-]*-g\)/r\1/;s/-/./g')
          last_version=$(git describe --abbrev=0 --tags | sed 's/^v//')

          tar --exclude-vcs --exclude='.github' --exclude='.gitmodules' --exclude='build' \
            -cvzf ../ldacBT-${version}.tar.gz .

          sed -n "/^## \[${last_version}]/,/^## \[/p" CHANGELOG.md | sed '1d;$d' | sed '/./,$!d' > ../VERSION_CHANGELOG.md

      - uses: actions/upload-artifact@v7
        with:
          name: artifact.zip
          path: |
            VERSION_CHANGELOG.md
            ldacBT-*.tar.gz
          if-no-files-found: error

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          body_path: VERSION_CHANGELOG.md
          files: ldacBT-*.tar.gz
